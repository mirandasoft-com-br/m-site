<script>
    (function () {
        const auth = window.authService;
        const content = document.getElementById('admin-content');
        const denied = document.getElementById('access-denied');

        const CMS_LAST_TAB_KEY = 'msoft_cms_last_tab';
        const CMS_VALID_TABS = ['theme', 'content', 'images', 'blog', 'blog_view', 'logs'];
        /** Ordem igual aos botões da sidebar (theme → content → images → blog → blog_view → logs) */
        const CMS_TAB_BTN_INDEX = { theme: 0, content: 1, images: 2, blog: 3, blog_view: 4, logs: 5 };

        window.loadTab = async function (tab) {
            if (!CMS_VALID_TABS.includes(tab)) tab = 'theme';
            try {
                localStorage.setItem(CMS_LAST_TAB_KEY, tab);
            } catch (e) { /* ignore */ }

            // Update Active State (sempre pelo id da aba — evita erro quando loadTab vem de botão interno)
            const btns = document.querySelectorAll('.cms-sidebar-btn');
            btns.forEach(el => el.classList.remove('active'));
            const idx = CMS_TAB_BTN_INDEX[tab];
            if (idx !== undefined && btns[idx]) {
                btns[idx].classList.add('active');
            }

            const container = document.getElementById('tab-content');
            container.style.opacity = '0';
            
            setTimeout(async () => {
            if (tab === 'theme') {
                container.innerHTML = `
                    <h4 class="mb-4 text-white fw-bold fs-3">Personalização Visual</h4>
                    <div class="alert cms-alert mb-5"><i class="bi bi-stars me-2 text-info"></i> Ajuste as cores vitais da sua identidade visual refletida no site inteiro.</div>
                    
                    <form id="theme-form" class="row g-4">
                        <div class="col-md-6">
                            <label class="form-label text-light mb-2">Cor Primária (Theme)</label>
                            <input type="color" class="form-control form-control-color cms-input cms-input-color w-100" value="#000000">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-light mb-2">Cor Secundária (Acentos)</label>
                            <input type="color" class="form-control form-control-color cms-input cms-input-color w-100" value="#28a745">
                        </div>
                        <div class="col-md-12">
                            <label class="form-label text-light mb-2">Tipografia Principal (Google Fonts)</label>
                            <select class="form-select cms-input w-100">
                                <option value="Inter">Inter (Elegante & Limpa)</option>
                                <option value="Roboto">Roboto (Clássica do Google)</option>
                                <option value="Poppins">Poppins (Redonda & Moderna)</option>
                                <option value="Outfit">Outfit (Tecnológica & Sharp)</option>
                            </select>
                        </div>
                        <div class="col-12 mt-5">
                            <hr class="border-secondary opacity-25 mb-4">
                            <div class="d-flex justify-content-end">
                                <button type="button" class="btn cms-btn-primary" onclick="window.core.toast('O design foi publicado e está ao vivo!', 'success')">
                                    <i class="bi bi-cloud-check me-2"></i> Publicar Alterações
                                </button>
                            </div>
                        </div>
                    </form>
                `;
            } else if (tab === 'content') {
                container.innerHTML = `
                    <h4 class="mb-4 text-white fw-bold fs-3">Textos e Links</h4>
                    <div class="alert alert-warning" style="background: rgba(245,158,11,0.1); border-color: rgba(245,158,11,0.2); color: #fcd34d;"><i class="bi bi-cone-striped me-2"></i> O editor completo avançado em modo de tela cheia está aguardando.</div>
                    <div class="text-center my-5 py-4">
                        <i class="bi bi-puzzle text-muted mb-4 d-block" style="font-size: 3rem;"></i>
                        <p class="text-muted">Acesse o construtor JSON de rotas e modifique o esqueleto textual do site.</p>
                        <a href="/admin" class="btn cms-btn-primary mt-3">
                            <i class="bi bi-box-arrow-up-right me-2"></i> Abrir Construtor Completo
                        </a>
                    </div>
                `;
            } else if (tab === 'logs') {
                container.innerHTML = '<div class="text-center py-5"><div class="spinner-grow text-info" role="status"></div><p class="text-muted mt-3">Acessando servidores...</p></div>';
                try {
                    const res = await window.core.fetchAPI('/logs');
                    let logsHtml = '';
                    if (res && res.success && res.data && res.data.length > 0) {
                        res.data.forEach(log => {
                            let color = 'text-success';
                            if (log.level === 'warning') color = 'text-warning';
                            if (log.level === 'error') color = 'text-danger';
                            const date = new Date(log.createdAt).toLocaleString('pt-BR');
                            const userTag = log.user ? '<span class="text-muted ms-2">(ID: ' + log.user + ')</span>' : '';
                            logsHtml += `<div class="mb-1 pb-1 border-bottom border-secondary border-opacity-25 ${color}"><span class="text-muted me-2">[${date}]</span> <span class="badge bg-secondary bg-opacity-25 me-2">${log.action}</span> ${log.details} ${userTag}</div>`;
                        });
                    } else {
                        logsHtml = '<div class="text-muted text-center pt-4"><i class="bi bi-wind fs-2 d-block mb-2"></i>Nenhum rastro detectado.</div>';
                    }
                    container.innerHTML = `
                        <h4 class="mb-4 text-white fw-bold fs-3">Monitoramento</h4>
                        <div class="alert cms-alert mb-4"><i class="bi bi-radar text-info me-2"></i>Auditoria Live-Action do seu ambiente em Produção.</div>
                        <div class="p-4 rounded font-monospace small" style="background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.05); height: 450px; overflow-y: auto;">
                            ${logsHtml}
                        </div>
                        <div class="text-end mt-4">
                            <button class="btn btn-outline-info" style="border-radius: 8px;" onclick="loadTab('logs')"><i class="bi bi-arrow-repeat me-2"></i> Atualizar Radar</button>
                        </div>
                    `;
                } catch (e) {
                    container.innerHTML = '<div class="alert alert-danger" style="background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.2);"><i class="bi bi-x-circle me-2"></i> Falha Crítica ao contatar a API (M-Manage).</div>';
                }
            } else if (tab === 'blog') {
                function escapeHtmlAttr(s) {
                    return String(s ?? '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
                }
                const blogUser = window.authService && window.authService.getUser();
                const blogLoggedAuthor = (blogUser && String(blogUser.name || blogUser.email || '').trim()) || '';

                container.innerHTML = `
                    <h4 class="mb-4 text-white fw-bold fs-3">Gerenciador de Artigos</h4>
                    <div class="alert cms-alert mb-4 d-flex justify-content-between align-items-center flex-wrap gap-3">
                        <div><i class="bi bi-pencil-square me-2 text-info"></i> Produza, engaje e direcione tráfego com a nossa estrutura SEO-Friendly.</div>
                        <button class="btn btn-sm btn-info text-dark fw-bold rounded-pill px-4" onclick="showBlogForm()"><i class="bi bi-plus-lg me-1"></i> Escrever Artigo</button>
                    </div>
                    
                    <div id="blog-list-container" class="mt-4">
                        <div class="text-center py-5"><div class="spinner-grow text-info" role="status"></div></div>
                    </div>
                    
                    <div id="blog-form-container" style="display: none;" class="mt-5 border-top border-light border-opacity-10 pt-5">
                        <h5 class="text-white mb-4 fw-bold fs-4"><i class="bi bi-journal-plus text-info me-2"></i> Estúdio do Artigo</h5>
                        <form id="new-blog-form" class="row g-4">
                            <input type="hidden" id="blog-id" name="id">
                            <div class="col-md-6">
                                <label class="form-label text-light mb-2">Título do Artigo</label>
                                <input type="text" class="form-control cms-input" id="blog-title" placeholder="Digite uma chamada impactante..." oninput="window.generateSlug(this.value)" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-light mb-2">Slug (URL SEO-friendly)</label>
                                <input type="text" class="form-control cms-input" id="blog-slug" placeholder="ex: dicas-de-tecnologia-2026" required aria-describedby="blog-slug-hint">
                                <div id="blog-slug-hint" class="form-text text-secondary small mt-1 d-none" data-slug-hint>Novo artigo: preenchido automaticamente pelo título.</div>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label text-light mb-2" for="blog-author-select">Nome do Autor</label>
                                <select class="form-select cms-input" id="blog-author-select" required>
                                    <option value="Anônimo">Anônimo</option>
                                    ${blogLoggedAuthor
                                        ? `<option value="${escapeHtmlAttr(blogLoggedAuthor)}" selected>${escapeHtmlAttr(blogLoggedAuthor)} — conta logada</option>`
                                        : ''}
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label text-light mb-2" for="blog-category">Área / Categoria</label>
                                <select class="form-select cms-input" id="blog-category" name="categories" multiple size="5" aria-describedby="blog-category-hint">
                                    <option value="Tecnologia">Tecnologia</option>
                                    <option value="White Label">White Label</option>
                                    <option value="Produtividade">Produtividade</option>
                                    <option value="Design">Design</option>
                                    <option value="Negócios">Negócios</option>
                                </select>
                                <div id="blog-category-hint" class="form-text text-secondary small mt-1">Segure Ctrl (Windows) ou Cmd (Mac) para selecionar várias.</div>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label text-light mb-2">Visibilidade</label>
                                <div class="form-control cms-input d-flex align-items-center" style="background: rgba(0,0,0,0.2) !important;">
                                     <div class="form-check form-switch m-0 pt-0 pb-0">
                                        <input class="form-check-input" type="checkbox" id="blog-published" checked>
                                        <label class="form-check-label text-white ms-1 mb-0" for="blog-published">Ativo ao Público</label>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-12">
                                <label class="form-label text-light mb-2">Tags Livres (Opcional, separadas por vírgula)</label>
                                <input type="text" class="form-control cms-input" id="blog-tags" placeholder="Ex: seo, frontend, inovação">
                            </div>
                            <div class="col-md-12">
                                <label class="form-label text-light mb-2">Capa do Artigo (Link de Imagem) - Opcional</label>
                                <input type="text" class="form-control cms-input" id="blog-imageUrl" placeholder="https:// ... imagem.jpg">
                            </div>
                            <div class="col-md-12 mt-4">
                                <label class="form-label text-light mb-2"><i class="bi bi-body-text me-2"></i> Corpo do Artigo</label>
                                <div class="btn-group mb-3" role="group" aria-label="Modo do editor">
                                    <input type="radio" class="btn-check" name="blog-editor-mode" id="blog-mode-visual" autocomplete="off" checked>
                                    <label class="btn btn-outline-light btn-sm" for="blog-mode-visual">Editor visual</label>
                                    <input type="radio" class="btn-check" name="blog-editor-mode" id="blog-mode-html" autocomplete="off">
                                    <label class="btn btn-outline-light btn-sm" for="blog-mode-html">HTML (anúncios / scripts)</label>
                                </div>
                                <p class="text-secondary small mb-2 d-none" id="blog-html-mode-hint">Use este modo para colar blocos Google AdSense no meio do texto. Os scripts são executados na página pública do blog.</p>
                                <div id="blog-editor-visual-wrap">
                                    <div style="box-shadow: 0 5px 15px rgba(0,0,0,0.2); border-radius: 10px;">
                                        <textarea id="blog-editor-container"></textarea>
                                    </div>
                                </div>
                                <div id="blog-editor-html-wrap" class="d-none">
                                    <textarea id="blog-content-html" class="form-control cms-input font-monospace" rows="18" spellcheck="false" placeholder="&lt;p&gt;Parágrafos...&lt;/p&gt;&#10;&lt;script async src=&quot;...googlesyndication...&quot;&gt;&lt;/script&gt;&#10;&lt;ins class=&quot;adsbygoogle&quot;&gt;...&lt;/ins&gt;"></textarea>
                                </div>
                                <input type="hidden" id="blog-content">
                            </div>
                            <div class="col-12 mt-4 text-end">
                                <hr class="border-secondary opacity-25 mb-4">
                                <button type="button" class="btn btn-link text-muted text-decoration-none me-3" onclick="hideBlogForm()">Descartar Rascunho</button>
                                <button type="button" class="btn cms-btn-primary" onclick="saveBlogForm()">
                                    <i class="bi bi-check2-circle me-1"></i> Publicar / Atualizar Corretamente
                                </button>
                            </div>
                        </form>
                    </div>
                `;

                // Funções auxiliares pro Blog
                function getBlogCategorySelections() {
                    const sel = document.getElementById('blog-category');
                    if (!sel) return [];
                    return Array.from(sel.selectedOptions).map((o) => o.value).filter(Boolean);
                }
                function setBlogCategorySelections(values) {
                    const sel = document.getElementById('blog-category');
                    if (!sel) return;
                    let arr = [];
                    if (Array.isArray(values)) arr = values.filter(Boolean);
                    else if (values && typeof values === 'string') arr = values.split(',').map((s) => s.trim()).filter(Boolean);
                    Array.from(sel.options).forEach((opt) => {
                        opt.selected = arr.includes(opt.value);
                    });
                }

                function getLoggedAuthorDisplayName() {
                    const u = window.authService && window.authService.getUser();
                    if (!u) return '';
                    return String(u.name || u.email || '').trim();
                }

                function clearEphemeralAuthorOptions() {
                    const sel = document.getElementById('blog-author-select');
                    if (!sel) return;
                    sel.querySelectorAll('option[data-ephemeral="1"]').forEach((o) => o.remove());
                }

                function applyDefaultBlogAuthor() {
                    const sel = document.getElementById('blog-author-select');
                    if (!sel) return;
                    const name = getLoggedAuthorDisplayName();
                    if (name && Array.from(sel.options).some((o) => o.value === name)) {
                        sel.value = name;
                    } else {
                        sel.value = 'Anônimo';
                    }
                }

                function setBlogAuthorValue(authorStr) {
                    const sel = document.getElementById('blog-author-select');
                    if (!sel) return;
                    const a = (authorStr || '').trim();
                    if (!a) {
                        applyDefaultBlogAuthor();
                        return;
                    }
                    if (!Array.from(sel.options).some((o) => o.value === a)) {
                        const o = document.createElement('option');
                        o.value = a;
                        o.textContent = a + ' (no artigo)';
                        o.setAttribute('data-ephemeral', '1');
                        sel.appendChild(o);
                    }
                    sel.value = a;
                }

                window.slugifyTitle = function (text) {
                    return String(text || '')
                        .toLowerCase()
                        .normalize('NFD')
                        .replace(/[\u0300-\u036f]/g, '')
                        .replace(/[^a-z0-9]+/g, '-')
                        .replace(/(^-|-$)/g, '');
                };

                function setBlogSlugMode(isCreate) {
                    const slugEl = document.getElementById('blog-slug');
                    const hint = document.querySelector('[data-slug-hint]');
                    if (!slugEl) return;
                    slugEl.readOnly = !!isCreate;
                    if (hint) hint.classList.toggle('d-none', !isCreate);
                }

                window.generateSlug = function (text) {
                    if (document.getElementById('blog-id').value) return;
                    document.getElementById('blog-slug').value = window.slugifyTitle(text);
                };

                function blogContentNeedsRawHtml(html) {
                    if (!html || typeof html !== 'string') return false;
                    const h = html.toLowerCase();
                    return (
                        h.includes('<script') ||
                        h.includes('adsbygoogle') ||
                        h.includes('googlesyndication') ||
                        h.includes('doubleclick') ||
                        h.includes('pagead2') ||
                        (h.includes('<iframe') && (h.includes('goog') || h.includes('doubleclick')))
                    );
                }

                function isBlogBodyEmpty(raw) {
                    if (!raw || !String(raw).trim()) return true;
                    const t = String(raw).trim();
                    if (t === '<p><br></p>' || t === '<p></p>' || t === '<br>') return true;
                    if (/<(script|iframe|img|video|ins|audio)[\s>/]/i.test(t)) return false;
                    const d = document.createElement('div');
                    d.innerHTML = raw;
                    const text = (d.textContent || '').replace(/\s/g, '');
                    return text === '';
                }

                function getBlogBodyContent() {
                    const htmlRadio = document.getElementById('blog-mode-html');
                    if (htmlRadio && htmlRadio.checked) {
                        const ta = document.getElementById('blog-content-html');
                        return ta ? String(ta.value).trim() : '';
                    }
                    if (window.quillEditorInstance) {
                        document.getElementById('blog-content').value = window.quillEditorInstance.root.innerHTML;
                    }
                    return String(document.getElementById('blog-content').value || '').trim();
                }

                function setBlogEditorMode(mode) {
                    const visualWrap = document.getElementById('blog-editor-visual-wrap');
                    const htmlWrap = document.getElementById('blog-editor-html-wrap');
                    const hint = document.getElementById('blog-html-mode-hint');
                    const ta = document.getElementById('blog-content-html');
                    if (!visualWrap || !htmlWrap) return;
                    if (mode === 'html') {
                        if (window.quillEditorInstance && ta) {
                            ta.value = window.quillEditorInstance.root.innerHTML;
                        }
                        visualWrap.classList.add('d-none');
                        htmlWrap.classList.remove('d-none');
                        if (hint) hint.classList.remove('d-none');
                        const vR = document.getElementById('blog-mode-visual');
                        const hR = document.getElementById('blog-mode-html');
                        if (hR) hR.checked = true;
                        if (vR) vR.checked = false;
                    } else {
                        if (ta && ta.value && blogContentNeedsRawHtml(ta.value)) {
                            if (window.core && window.core.toast) {
                                window.core.toast('Conteúdo com anúncios/scripts: permaneça no modo HTML.', 'warning');
                            }
                            const hRadio = document.getElementById('blog-mode-html');
                            if (hRadio) hRadio.checked = true;
                            return;
                        }
                        if (window.quillEditorInstance && ta) {
                            window.quillEditorInstance.root.innerHTML = ta.value || '<p><br></p>';
                        }
                        const hidden = document.getElementById('blog-content');
                        if (hidden && window.quillEditorInstance) {
                            hidden.value = window.quillEditorInstance.root.innerHTML;
                        }
                        visualWrap.classList.remove('d-none');
                        htmlWrap.classList.add('d-none');
                        if (hint) hint.classList.add('d-none');
                        const vR2 = document.getElementById('blog-mode-visual');
                        const hR2 = document.getElementById('blog-mode-html');
                        if (vR2) vR2.checked = true;
                        if (hR2) hR2.checked = false;
                    }
                }

                function resetBlogEditorChrome() {
                    const visualRadio = document.getElementById('blog-mode-visual');
                    const htmlRadio = document.getElementById('blog-mode-html');
                    const visualWrap = document.getElementById('blog-editor-visual-wrap');
                    const htmlWrap = document.getElementById('blog-editor-html-wrap');
                    const hint = document.getElementById('blog-html-mode-hint');
                    const ta = document.getElementById('blog-content-html');
                    if (visualRadio) visualRadio.checked = true;
                    if (htmlRadio) htmlRadio.checked = false;
                    if (visualWrap) visualWrap.classList.remove('d-none');
                    if (htmlWrap) htmlWrap.classList.add('d-none');
                    if (hint) hint.classList.add('d-none');
                    if (ta) ta.value = '';
                }

                (function wireBlogEditorModeRadios() {
                    const rv = document.getElementById('blog-mode-visual');
                    const rh = document.getElementById('blog-mode-html');
                    if (rv) {
                        rv.addEventListener('change', () => {
                            if (rv.checked) setBlogEditorMode('visual');
                        });
                    }
                    if (rh) {
                        rh.addEventListener('change', () => {
                            if (rh.checked) setBlogEditorMode('html');
                        });
                    }
                })();
                
                window.refreshBlogList = async function() {
                    try {
                        const res = await window.core.fetchAPI('/blogs/all');
                        const listEl = document.getElementById('blog-list-container');
                        if (res && res.success && res.data.length > 0) {
                            window.blogCache = {};
                            let listHtml = '<div class="list-group gap-3">';
                            res.data.forEach(blog => {
                                window.blogCache[blog._id] = blog;
                                const status = blog.published ? '<span class="badge bg-success bg-opacity-25 text-success px-3 py-2 rounded-pill"><i class="bi bi-check-circle-fill me-1"></i> Publicado</span>' : '<span class="badge bg-warning bg-opacity-25 text-warning px-3 py-2 rounded-pill"><i class="bi bi-clock-history me-1"></i> Rascunho</span>';
                                listHtml += `
                                    <div class="list-group-item border-0 p-4 rounded-4 d-flex justify-content-between align-items-center flex-wrap" style="background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05) !important; transition: all 0.3s ease;" onmouseover="this.style.boxShadow='0 10px 25px rgba(0,0,0,0.5)'; this.style.transform='translateY(-3px)';" onmouseout="this.style.boxShadow=''; this.style.transform='';">
                                        <div class="d-flex flex-column gap-2 mb-2 mb-md-0">
                                            <h5 class="text-white mb-0 fw-bold"><a href="/blog/${blog.slug}" target="_blank" class="text-decoration-none text-white">${blog.title}</a></h5>
                                            <div class="d-flex flex-wrap gap-3 align-items-center">
                                                ${status}
                                                <span class="text-muted small"><i class="bi bi-folder text-info me-1"></i> ${(blog.categories && blog.categories.length ? blog.categories.join(', ') : (blog.category || 'Geral'))}</span>
                                                <span class="text-muted small"><i class="bi bi-eye text-info me-1"></i> ${blog.views || 0} visualizações</span>
                                            </div>
                                        </div>
                                        <div class="d-flex gap-2">
                                            <button class="btn btn-outline-info" style="border-radius: 8px;" onclick="editBlog('${blog._id}')" title="Modificar Texto"><i class="bi bi-pencil-square"></i></button>
                                            <button class="btn btn-outline-danger" style="border-radius: 8px;" onclick="deleteBlog('${blog._id}')" title="Apagar"><i class="bi bi-trash3"></i></button>
                                        </div>
                                    </div>
                                `;
                            });
                            listHtml += '</div>';
                            listEl.innerHTML = listHtml;
                        } else {
                            listEl.innerHTML = '<div class="alert alert-dark border-secondary bg-black text-white text-center rounded-4"><i class="bi bi-wind fs-2 d-block text-muted mb-3 mt-2"></i>Nenhum artigo detectado. O estúdio está vazio!</div>';
                        }
                    } catch (e) {
                        const listEl = document.getElementById('blog-list-container');
                        if (listEl) listEl.innerHTML = '<div class="text-danger p-3 bg-danger bg-opacity-10 rounded">Erro estrutural ao se conectar com a API (M-Manage). O Serviço M-API está ativo?</div>';
                    }
                };

                window.showBlogForm = async function() {
                    const formStr = document.getElementById('new-blog-form');
                    if (formStr) formStr.reset();
                    clearEphemeralAuthorOptions();
                    resetBlogEditorChrome();
                    document.getElementById('blog-id').value = '';
                    applyDefaultBlogAuthor();
                    setBlogCategorySelections(['Tecnologia']);
                    document.getElementById('blog-tags').value = '';
                    document.getElementById('blog-published').checked = true;
                    document.getElementById('blog-form-container').style.display = 'block';
                    setBlogSlugMode(true);
                    window.generateSlug(document.getElementById('blog-title').value);

                    // Inicializando o Summernote (free, sem token)
                    if (!window.quillEditorInstance || !window.jQuery || !window.jQuery('#blog-editor-container').next('.note-editor').length) {
                        try {
                            const $editor = window.jQuery('#blog-editor-container');
                            $editor.summernote({
                                height: 360,
                                placeholder: 'A mágica começa agora. Escreva seu artigo...',
                                dialogsInBody: true,
                                tabsize: 2,
                                toolbar: [
                                    ['style', ['style']],
                                    ['font', ['bold', 'italic', 'underline', 'clear']],
                                    ['fontname', ['fontname']],
                                    ['color', ['color']],
                                    ['para', ['ul', 'ol', 'paragraph']],
                                    ['table', ['table']],
                                    ['insert', ['link', 'picture', 'video', 'hr']],
                                    ['view', ['fullscreen', 'codeview', 'help']],
                                    ['misc', ['undo', 'redo']]
                                ]
                            });
                            const editor = $editor;
                            window.quillEditorInstance = {
                                _editor: editor,
                                root: {
                                    get innerHTML() {
                                        return editor.summernote('code') || '<p><br></p>';
                                    },
                                    set innerHTML(value) {
                                        editor.summernote('code', value || '<p><br></p>');
                                    }
                                },
                                on(eventName, callback) {
                                    if (eventName === 'text-change') {
                                        editor.on('summernote.change', callback);
                                    }
                                }
                            };
                            window.quillEditorInstance.on('text-change', function() {
                                document.getElementById('blog-content').value = window.quillEditorInstance.root.innerHTML;
                            });
                        } catch(e) { console.error('Summernote não iniciou: ', e); }
                    } else {
                        window.quillEditorInstance.root.innerHTML = '';
                    }
                    document.getElementById('blog-content').value = '';
                    window.scrollTo({ top: document.getElementById('blog-form-container').offsetTop - 100, behavior: 'smooth' });
                };

                window.hideBlogForm = function() {
                    document.getElementById('blog-form-container').style.display = 'none';
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                };

                window.editBlog = async function(id) {
                    const blog = window.blogCache[id];
                    if(!blog) return;
                    await showBlogForm();
                    document.getElementById('blog-id').value = blog._id;
                    document.getElementById('blog-title').value = blog.title || '';
                    document.getElementById('blog-slug').value = blog.slug || '';
                    setBlogSlugMode(false);
                    setBlogAuthorValue(blog.author || '');
                    if (blog.categories && blog.categories.length) {
                        setBlogCategorySelections(blog.categories);
                    } else {
                        setBlogCategorySelections(blog.category || '');
                    }
                    document.getElementById('blog-tags').value = (blog.tags || []).join(', ');
                    document.getElementById('blog-imageUrl').value = blog.imageUrl || '';
                    document.getElementById('blog-published').checked = blog.published;

                    const raw = blog.content || '';
                    if (blogContentNeedsRawHtml(raw)) {
                        const vRadio = document.getElementById('blog-mode-visual');
                        const hRadio = document.getElementById('blog-mode-html');
                        const visualWrap = document.getElementById('blog-editor-visual-wrap');
                        const htmlWrap = document.getElementById('blog-editor-html-wrap');
                        const hint = document.getElementById('blog-html-mode-hint');
                        const ta = document.getElementById('blog-content-html');
                        if (hRadio) hRadio.checked = true;
                        if (vRadio) vRadio.checked = false;
                        if (ta) ta.value = raw;
                        if (visualWrap) visualWrap.classList.add('d-none');
                        if (htmlWrap) htmlWrap.classList.remove('d-none');
                        if (hint) hint.classList.remove('d-none');
                        if (window.quillEditorInstance) {
                            window.quillEditorInstance.root.innerHTML = '';
                        }
                    } else {
                        resetBlogEditorChrome();
                        if (window.quillEditorInstance) {
                            window.quillEditorInstance.root.innerHTML = raw;
                        }
                    }
                    document.getElementById('blog-content').value = raw;
                };

                window.saveBlogForm = async function() {
                    const btnSave = event.target.closest('button');
                    const orgText = btnSave.innerHTML;
                    btnSave.innerHTML = '<div class="spinner-border spinner-border-sm me-2"></div>Salvando...';
                    btnSave.disabled = true;

                    const id = document.getElementById('blog-id').value;
                    const tagsStr = document.getElementById('blog-tags').value;
                    const categories = getBlogCategorySelections();
                    const titleVal = document.getElementById('blog-title').value.trim();
                    let slugVal = document.getElementById('blog-slug').value.trim();
                    if (!id && titleVal && !slugVal) {
                        slugVal = window.slugifyTitle(titleVal);
                        document.getElementById('blog-slug').value = slugVal;
                    }
                    const bodyContent = getBlogBodyContent();
                    const payload = {
                        title: document.getElementById('blog-title').value,
                        slug: slugVal,
                        author: document.getElementById('blog-author-select').value,
                        categories,
                        category: categories[0] || 'Geral',
                        tags: tagsStr ? tagsStr.split(',').map(t => t.trim()).filter(Boolean) : [],
                        imageUrl: document.getElementById('blog-imageUrl').value,
                        content: bodyContent,
                        published: document.getElementById('blog-published').checked
                    };
                    
                    if (!payload.title || !payload.slug || isBlogBodyEmpty(bodyContent)) {
                        window.core.toast('O Título, o Slug e o Conteúdo são cruciais e obrigatórios.', 'warning');
                        btnSave.innerHTML = orgText;
                        btnSave.disabled = false;
                        return;
                    }

                    try {
                        const endpoint = id ? '/blogs/' + id : '/blogs';
                        const method = id ? 'PUT' : 'POST';
                        const res = await window.core.fetchAPI(endpoint, method, payload);
                        if (res && res.success) {
                            window.core.toast('Show! A master piece de conteúdo foi guardada.', 'success');
                            hideBlogForm();
                            refreshBlogList();
                        } else {
                            window.core.toast('Erro ao processar: ' + (res.error || 'Código Desconhecido'), 'error');
                        }
                    } catch(e) {
                        window.core.toast('Pane na rede. A API falhou no handshake.', 'error');
                    } finally {
                        btnSave.innerHTML = orgText;
                        btnSave.disabled = false;
                    }
                };

                window.deleteBlog = async function(id) {
                    if (!confirm('Esta ação desintegrará o post permanentemente do seu Banco de Dados. Prosseguir?')) return;
                    try {
                        const res = await window.core.fetchAPI('/blogs/' + id, 'DELETE');
                        if (res && res.success) {
                            window.core.toast('O arquivo foi incinerado com exímio sucesso.', 'success');
                            refreshBlogList();
                        } else {
                            window.core.toast('Anomalia tentando excluir o objeto', 'error');
                        }
                    } catch(e) {
                        window.core.toast('Problema conectando-se à base de dados.', 'error');
                    }
                };

                // Trigger inicial
                refreshBlogList();
            } else if (tab === 'blog_view') {
                container.innerHTML = `
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h4 class="text-white fw-bold fs-3 m-0">Visualização do Site</h4>
                        <button class="btn btn-outline-light btn-sm rounded-pill px-3" onclick="loadTab('blog_view')">
                            <i class="bi bi-arrow-clockwise me-1"></i> Atualizar Feed
                        </button>
                    </div>
                    <div id="cms-blog-site-grid" class="row g-4">
                        <div class="col-12 text-center py-5"><div class="spinner-border text-info"></div></div>
                    </div>
                `;

                // Reutilizamos a lógica do blog.html adaptada para o container do CMS
                const loadCmsBlogView = async () => {
                    const grid = document.getElementById('cms-blog-site-grid');
                    if (!grid) return;
                    
                    try {
                        const res = await window.core.fetchAPI('/blogs');
                        if (res && res.success && res.data.length > 0) {
                            grid.innerHTML = res.data.map((post, index) => {
                                const date = new Date(post.createdAt || Date.now()).toLocaleDateString('pt-BR');
                                const img = post.imageUrl || 'https://placehold.co/600x400/1e293b/6366f1?text=Blog';
                                return `
                                    <div class="col-md-6 col-lg-4">
                                        <article class="h-100 d-flex flex-column gap-2" style="cursor: pointer;" onclick="window.open('/blog/${post.slug}', '_blank')">
                                            <div class="rounded-4 overflow-hidden mb-2" style="aspect-ratio: 16/10;">
                                                <img src="${img}" class="w-100 h-100 object-fit-cover" alt="${post.title}">
                                            </div>
                                            <div class="small text-muted mb-1">${date} • ${post.category || 'Geral'}</div>
                                            <h6 class="text-white fw-bold mb-1 line-clamp-2">${post.title}</h6>
                                            <p class="text-muted small mb-0 line-clamp-2">${post.description || ''}</p>
                                        </article>
                                    </div>
                                `;
                            }).join('');
                        } else {
                            grid.innerHTML = '<div class="col-12 text-center text-muted py-5">Nenhum post publicado para exibir.</div>';
                        }
                    } catch (e) {
                        grid.innerHTML = '<div class="col-12 text-danger py-5">Erro ao carregar feed.</div>';
                    }
                };
                loadCmsBlogView();
            } else if (tab === 'images') {
                container.innerHTML = `
                    <h4 class="mb-4 text-white fw-bold fs-3">Galeria e Assets do Domínio</h4>
                    <p class="text-muted mb-5">Manutenção dos pilares de identidade imagética do ecossistema.</p>
                    
                    <div class="row g-4">
                        <div class="col-md-6">
                            <div class="card bg-transparent border-0 h-100 rounded-4" style="background: rgba(0,0,0,0.3) !important; border: 1px dashed rgba(255,255,255,0.1) !important;">
                                <div class="card-body text-center p-5">
                                    <h6 class="text-white mb-4">Logotipo Mestre</h6>
                                    <div class="p-3 mb-4 d-flex align-items-center justify-content-center mx-auto rounded-circle" style="width: 120px; height: 120px; background: rgba(56,189,248,0.1); border: 1px solid rgba(56,189,248,0.2);">
                                        <i class="bi bi-image text-info" style="font-size: 3rem;"></i>
                                    </div>
                                    <button class="btn btn-outline-info rounded-pill px-4"><i class="bi bi-upload me-2"></i> Substituir Logotipo</button>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="card bg-transparent border-0 h-100 rounded-4" style="background: rgba(0,0,0,0.3) !important; border: 1px dashed rgba(255,255,255,0.1) !important;">
                                <div class="card-body text-center p-5">
                                    <h6 class="text-white mb-4">Favicon (Ícone de Aba)</h6>
                                    <div class="p-3 mb-4 d-flex align-items-center justify-content-center mx-auto rounded-circle" style="width: 120px; height: 120px; background: rgba(56,189,248,0.1); border: 1px solid rgba(56,189,248,0.2);">
                                        <i class="bi bi-bezier2 text-info" style="font-size: 3rem;"></i>
                                    </div>
                                    <button class="btn btn-outline-info rounded-pill px-4"><i class="bi bi-upload me-2"></i> Substituir Ícone</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }
            container.style.transition = 'opacity 0.4s ease';
            container.style.opacity = '1';
            }, 100);
        }

        if (auth && auth.isAuthenticated() && auth.hasRole('admin')) {
            content.style.display = 'block';
            let initialTab = 'theme';
            try {
                const saved = localStorage.getItem(CMS_LAST_TAB_KEY);
                if (saved && CMS_VALID_TABS.includes(saved)) initialTab = saved;
            } catch (e) { /* ignore */ }
            loadTab(initialTab);
        } else {
            denied.style.display = 'block';
        }
    })();
</script>
