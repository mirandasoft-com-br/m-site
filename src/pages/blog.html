</style>
<!-- Blog Hero Section -->

<!-- Blog Grid -->
<section class="dev-section pt-0">
    <div class="container">
        <!-- Filter/Search (Optional visual only for now) -->
        <div class="row mb-5">
            <div class="col-12">
                <div class="d-flex justify-content-center gap-3 flex-wrap" id="blog-filters">
                    <button class="btn btn-outline-light rounded-pill px-4 active" data-filter="todos">Todos</button>
                    <button class="btn btn-outline-light rounded-pill px-4" data-filter="white label">White Label</button>
                    <button class="btn btn-outline-light rounded-pill px-4" data-filter="tecnologia">Tecnologia</button>
                    <button class="btn btn-outline-light rounded-pill px-4" data-filter="produtividade">Produtividade</button>
                    <button class="btn btn-outline-light rounded-pill px-4" data-filter="design">Design</button>
                    <button class="btn btn-outline-light rounded-pill px-4" data-filter="negócios">Negócios</button>
                </div>
            </div>
        </div>

        <!-- Posts Grid -->
        <div class="row g-4" id="blog-grid">
            <!-- Posts will be injected here by JS -->
        </div>

        <!-- Pagination -->
        <div class="row mt-5">

                <button class="dev-btn dev-btn-secondary">
                    Carregar Mais Posts
                </button>
            </div>
        </div>
    </div>
</section>

<script>
    (function () {
        const grid = document.getElementById('blog-grid');
        const filterContainer = document.getElementById('blog-filters');
        const heroTitle = document.querySelector('.dev-hero-title');
        const heroSubtitle = document.querySelector('.dev-hero-subtitle');
        const api = window.config?.api?.baseUrl || 'http://localhost:3000';

        const ADSENSE_CLIENT = 'ca-pub-7844284078845131';
        const ADSENSE_SLOT_BLOG_POST = '4406317970';
        const ADSENSE_SLOT_BLOG_VERTICAL = '6976640993';

        function ensureAdsenseScript() {
            if (document.getElementById('adsense-script-blog')) return;
            const s = document.createElement('script');
            s.id = 'adsense-script-blog';
            s.async = true;
            s.src = `https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=${encodeURIComponent(ADSENSE_CLIENT)}`;
            s.crossOrigin = 'anonymous';
            document.head.appendChild(s);
        }

        function appendAdSenseUnit(containerEl, adSlot) {
            if (!containerEl || containerEl.querySelector('ins.adsbygoogle')) return;
            const ins = document.createElement('ins');
            ins.className = 'adsbygoogle';
            ins.style.display = 'block';
            ins.setAttribute('data-ad-client', ADSENSE_CLIENT);
            ins.setAttribute('data-ad-slot', adSlot);
            ins.setAttribute('data-ad-format', 'auto');
            ins.setAttribute('data-full-width-responsive', 'true');
            containerEl.appendChild(ins);
        }

        function pushAdsenseSlots(root) {
            if (!root) return;
            root.querySelectorAll('ins.adsbygoogle:not([data-adsense-pushed])').forEach((ins) => {
                ins.setAttribute('data-adsense-pushed', '1');
                try {
                    (window.adsbygoogle = window.adsbygoogle || []).push({});
                } catch (e) {
                    console.warn('Adsense push failed', e);
                }
            });
        }

        function mountBlogPostAds(container) {
            if (!container) return;
            ensureAdsenseScript();
            container.querySelectorAll('.ad-sidebar-content').forEach((el) => {
                appendAdSenseUnit(el, ADSENSE_SLOT_BLOG_VERTICAL);
            });
            container.querySelectorAll('.ad-inline-content').forEach((el) => {
                appendAdSenseUnit(el, ADSENSE_SLOT_BLOG_POST);
            });
            pushAdsenseSlots(container);
        }

        // Check for slug in params
        const pathSegments = window.location.pathname.split('/').filter(Boolean);
        // segment[0] is 'blog'. segment[1] is slug.
        const slug = pathSegments[1];

        // --- Detail View ---
        async function loadPost(slug) {
            // Adjust layout for detail
            if (heroTitle) heroTitle.innerHTML = '<div class="spinner-border text-light"></div>';
            if (heroSubtitle) heroSubtitle.style.display = 'none';

            // Clean grid container for article content
            if (grid) {
                grid.parentElement.innerHTML = '<div id="post-content" class="animate__animated animate__fadeInUp"></div>';
            }
            const container = document.getElementById('post-content');

            try {
                let post = null;
                if (window.core && window.core.fetchAPI) {
                    const res = await window.core.fetchAPI(`/blogs/${slug}`);
                    if (res && res.success) post = res.data;
                } else {
                    const res = await fetch(`${api}/blogs/${slug}`);
                    const json = await res.json();
                    if (json.success) post = json.data;
                }

                if (!post) throw new Error('Post not found');

                const hasCoverImage = !!(post.imageUrl && String(post.imageUrl).trim());

                // SEO: meta tags dinâmicos
                const canonicalUrl = (typeof window !== 'undefined' && window.location.origin)
                    ? `${window.location.origin}/blog/${post.slug}`
                    : `https://mirandasoft.com.br/blog/${post.slug}`;
                const desc = (post.description || (post.content || '').replace(/<[^>]*>/g, '').substring(0, 160).trim() || post.title) + ' | Miranda Soft';
                const pubDate = post.createdAt ? new Date(post.createdAt).toISOString() : '';

                document.title = `${post.title} | Blog Miranda Soft`;

                const setMeta = (attr, val, prop = 'content') => {
                    const sel = attr.startsWith('og:') || attr.startsWith('twitter:') ? `meta[property="${attr}"]` : `meta[name="${attr}"]`;
                    let el = document.querySelector(sel);
                    if (!el) {
                        el = document.createElement('meta');
                        if (attr.startsWith('og:') || attr.startsWith('twitter:')) el.setAttribute('property', attr);
                        else el.setAttribute('name', attr);
                        document.head.appendChild(el);
                    }
                    el.setAttribute(prop, val || '');
                };

                setMeta('description', desc);
                setMeta('og:type', 'article');
                setMeta('og:url', canonicalUrl);
                setMeta('og:title', post.title);
                setMeta('og:description', desc);
                if (hasCoverImage) {
                    setMeta('og:image', post.imageUrl.trim());
                    setMeta('twitter:image', post.imageUrl.trim());
                } else {
                    const ogImg = document.querySelector('meta[property="og:image"]');
                    const twImg = document.querySelector('meta[property="twitter:image"]');
                    if (ogImg) ogImg.remove();
                    if (twImg) twImg.remove();
                }
                setMeta('og:site_name', 'Miranda Soft');
                if (pubDate) setMeta('article:published_time', pubDate);
                if (post.author) setMeta('article:author', post.author);
                setMeta('twitter:card', hasCoverImage ? 'summary_large_image' : 'summary');
                setMeta('twitter:title', post.title);
                setMeta('twitter:description', desc);

                const linkCanonical = document.querySelector('link[rel="canonical"]') || document.createElement('link');
                linkCanonical.rel = 'canonical';
                linkCanonical.href = canonicalUrl;
                if (!document.querySelector('link[rel="canonical"]')) document.head.appendChild(linkCanonical);

                const jsonLd = {
                    '@context': 'https://schema.org',
                    '@type': 'Article',
                    headline: post.title,
                    description: desc,
                    ...(hasCoverImage && { image: post.imageUrl.trim() }),
                    datePublished: pubDate,
                    dateModified: (post.updatedAt ? new Date(post.updatedAt).toISOString() : pubDate),
                    author: { '@type': 'Person', name: post.author || 'Miranda Soft' },
                    publisher: { '@type': 'Organization', name: 'Miranda Soft', url: 'https://mirandasoft.com.br' },
                    mainEntityOfPage: { '@type': 'WebPage', '@id': canonicalUrl }
                };
                let scriptLd = document.getElementById('blog-jsonld');
                if (scriptLd) scriptLd.remove();
                scriptLd = document.createElement('script');
                scriptLd.id = 'blog-jsonld';
                scriptLd.type = 'application/ld+json';
                scriptLd.textContent = JSON.stringify(jsonLd);
                document.head.appendChild(scriptLd);

                // Render Hero Metadata
                if (heroTitle) {
                    heroTitle.innerHTML = `
                        ${post.title} <br>
                        <span class="fs-5 text-muted fw-normal mt-3 d-block">Por ${post.author} • ${new Date(post.createdAt).toLocaleDateString('pt-BR')}</span>
                    `;
                }

                // Render Content: verticais no fluid; texto + anúncios inline só no container-lg
                container.innerHTML = `
                    <div class="blog-post-fluid-breakout">
                        <div class="container-fluid blog-post-fluid-inner px-2 px-sm-3 px-xl-4">
                            <div class="row align-items-start justify-content-center g-0">
                                <aside class="col-xl-2 blog-ads-sidebar blog-ads-sidebar--left">
                                    <div class="ad-sidebar-slot is-sticky position-relative" data-ad-position="left" data-ad-slot="${ADSENSE_SLOT_BLOG_VERTICAL}">
                                        <span class="ad-slot-label">Publicidade</span>
                                        <!-- blog-post-vertical: lateral esquerda -->
                                        <div class="ad-sidebar-content" id="ad-sidebar-left"></div>
                                    </div>
                                </aside>
                                <div class="col-12 col-lg-11 col-xl-8">
                                    <article class="container-lg mx-auto px-3 px-lg-4 blog-post-text-wrap" itemscope itemtype="https://schema.org/Article">
                                        ${hasCoverImage ? `<header class="mb-5"><img src="${post.imageUrl.trim()}" class="w-100 rounded-3 mb-4 shadow" alt="${(post.title || '').replace(/"/g, '&quot;')}" itemprop="image" loading="lazy"></header>` : ''}
                                        <div class="blog-content pb-4 text-white" style="line-height: 1.8; font-size: 1.15rem;" itemprop="articleBody" data-inline-ads="enabled">
                                            ${post.content || '<p class="text-muted">Sem conteúdo disponível.</p>'}
                                        </div>
                                        <hr class="border-secondary mt-5 mb-4 opacity-25">
                                        <div class="d-flex justify-content-between align-items-center flex-wrap gap-4 mt-4">
                                            <div>
                                                <a href="/blog" class="btn btn-outline-light rounded-pill px-4"><i class="bi bi-arrow-left me-2"></i> Voltar ao Blog</a>
                                            </div>
                                            <div class="d-flex gap-2 align-items-center flex-wrap">
                                                <span class="text-muted small me-2"><i class="bi bi-tags"></i> Tags:</span>
                                                ${(post.tags && post.tags.length > 0) ? post.tags.map(t => `<span class="badge bg-secondary opacity-50 text-white">${t}</span>`).join('') : '<span class="text-muted small">Nenhuma tag</span>'}
                                            </div>
                                        </div>
                                        <div class="mt-4 pt-4 border-top border-secondary border-opacity-25">
                                            <h6 class="text-white mb-3 fw-bold">Compartilhe este artigo na sua rede:</h6>
                                            <div class="d-flex gap-3 flex-wrap">
                                                <a href="https://twitter.com/intent/tweet?text=${encodeURIComponent(post.title)}&url=${encodeURIComponent(window.location.href)}" target="_blank" class="btn btn-outline-light rounded-circle" style="width: 45px; height: 45px; display: flex; align-items: center; justify-content: center;"><i class="bi bi-twitter-x"></i></a>
                                                <a href="https://www.linkedin.com/shareArticle?mini=true&title=${encodeURIComponent(post.title)}&url=${encodeURIComponent(window.location.href)}" target="_blank" class="btn btn-outline-light rounded-circle" style="width: 45px; height: 45px; display: flex; align-items: center; justify-content: center;"><i class="bi bi-linkedin"></i></a>
                                                <a href="https://api.whatsapp.com/send?text=${encodeURIComponent('Acabei de ler esse conteúdo incrível no MSOFT: ' + post.title + ' ' + window.location.href)}" target="_blank" class="btn btn-outline-light rounded-circle" style="border-color: #22c55e; color: #22c55e; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center;"><i class="bi bi-whatsapp"></i></a>
                                                <a href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(window.location.href)}" target="_blank" class="btn btn-outline-light rounded-circle" style="border-color: #3b82f6; color: #3b82f6; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center;"><i class="bi bi-facebook"></i></a>
                                            </div>
                                        </div>
                                    </article>
                                </div>
                                <aside class="col-xl-2 blog-ads-sidebar blog-ads-sidebar--right">
                                    <div class="ad-sidebar-slot is-sticky position-relative" data-ad-position="right" data-ad-slot="${ADSENSE_SLOT_BLOG_VERTICAL}">
                                        <span class="ad-slot-label">Publicidade</span>
                                        <!-- blog-post-vertical: lateral direita -->
                                        <div class="ad-sidebar-content" id="ad-sidebar-right"></div>
                                    </div>
                                </aside>
                            </div>
                        </div>
                    </div>
                `;

                const articleBody = container.querySelector('.blog-content');
                if (articleBody) {
                    injectInlineAdSlots(articleBody);
                    if (window.core && typeof window.core.executeScripts === 'function') {
                        window.core.executeScripts(articleBody);
                    } else {
                        articleBody.querySelectorAll('script').forEach((oldScript) => {
                            const newScript = document.createElement('script');
                            Array.from(oldScript.attributes).forEach((attr) => {
                                newScript.setAttribute(attr.name, attr.value);
                            });
                            newScript.textContent = oldScript.textContent;
                            oldScript.parentNode.replaceChild(newScript, oldScript);
                        });
                    }
                }
                mountBlogPostAds(container);

            } catch (e) {
                console.error(e);
                if (heroTitle) heroTitle.innerHTML = 'Post não encontrado';
                if (container) container.innerHTML = '<div class="text-center"><a href="/blog" class="btn btn-primary">Voltar para o Blog</a></div>';
            }
        }

        function injectInlineAdSlots(articleBody) {
            const paragraphSelector = 'p, .ql-align-justify';
            const paragraphs = Array.from(articleBody.querySelectorAll(paragraphSelector));
            if (paragraphs.length < 3) return;

            const insertionIndexes = [2, 5, 8].filter((idx) => idx < paragraphs.length);
            insertionIndexes.forEach((paragraphIndex, slotIndex) => {
                const referenceParagraph = paragraphs[paragraphIndex];
                if (!referenceParagraph || referenceParagraph.nextElementSibling?.classList.contains('ad-inline-slot')) {
                    return;
                }

                const slot = document.createElement('div');
                slot.className = 'ad-inline-slot';
                slot.setAttribute('data-ad-position', `inline-${slotIndex + 1}`);
                slot.setAttribute('data-ad-slot', ADSENSE_SLOT_BLOG_POST);
                slot.innerHTML = `
                    <span class="ad-slot-label">Publicidade</span>
                    <!-- blog-post: anúncio entre parágrafos -->
                    <div class="ad-inline-content" id="ad-inline-${slotIndex + 1}"></div>
                `;
                referenceParagraph.insertAdjacentElement('afterend', slot);
            });
        }

        function resetBlogMeta() {
            document.title = 'Blog & Insights | Miranda Soft';
            const def = {
                description: 'Fique por dentro das últimas novidades sobre Apps White Label, tendências tech e dicas para impulsionar sua produtividade.',
                'og:type': 'website', 'og:url': 'https://mirandasoft.com.br/blog', 'og:title': 'Blog | Miranda Soft', 'og:description': 'Insights sobre tecnologia e produtividade.',
                'twitter:card': 'summary_large_image', 'twitter:title': 'Blog | Miranda Soft', 'twitter:description': 'Insights sobre tecnologia e produtividade.'
            };
            const setMeta = (attr, val) => {
                const sel = attr.startsWith('og:') || attr.startsWith('twitter:') ? `meta[property="${attr}"]` : `meta[name="${attr}"]`;
                const el = document.querySelector(sel);
                if (el) el.setAttribute('content', val || '');
            };
            Object.entries(def).forEach(([k, v]) => setMeta(k, v));
            const ld = document.getElementById('blog-jsonld');
            if (ld) ld.remove();
        }

        // --- List View ---
        async function loadBlogs() {
            if (!grid) return;
            resetBlogMeta();
            grid.innerHTML = '<div class="col-12 text-center py-5"><div class="spinner-border text-primary"></div></div>';

            const normalizeCategory = (value) => (value || 'geral').toString().trim().toLowerCase();
            const defaultFilterLabels = ['Todos', 'White Label', 'Tecnologia', 'Produtividade', 'Design', 'Negócios'];
            let selectedFilter = 'todos';
            let allPosts = [];

            try {
                if (window.core && window.core.fetchAPI) {
                    const res = await window.core.fetchAPI('/blogs');
                    if (res && res.success) allPosts = res.data;
                } else {
                    const res = await fetch(`${api}/blogs`);
                    const json = await res.json();
                    if (json.success) allPosts = json.data;
                }
            } catch (e) {
                console.warn('Failed to load blogs from API', e);
            }

            if (allPosts.length === 0) {
                grid.innerHTML = '<div class="col-12 text-center text-muted py-5">Nenhuma postagem encontrada.</div>';
                return;
            }

            const renderPosts = () => {
                const posts = selectedFilter === 'todos'
                    ? allPosts
                    : allPosts.filter((post) => normalizeCategory(post.category) === selectedFilter);

                if (posts.length === 0) {
                    grid.innerHTML = '<div class="col-12 text-center text-muted py-5">Nenhuma postagem nessa categoria.</div>';
                    return;
                }

                grid.innerHTML = posts.map((post, index) => {
                    const date = new Date(post.createdAt || Date.now()).toLocaleDateString('pt-BR', { day: 'numeric', month: 'short', year: 'numeric' });
                    const hasImage = !!(post.imageUrl && post.imageUrl.trim());

                    return `
                    <div class="col-md-6 col-lg-4 animate-on-scroll" style="animation-delay: ${index * 0.1}s">
                    <article class="card h-100 border-0 bg-transparent text-white" style="transition: transform 0.3s ease;">
                        ${hasImage ? `
                        <div class="position-relative overflow-hidden rounded-4 mb-3" style="aspect-ratio: 16/10;">
                            <img src="${post.imageUrl}" class="w-100 h-100 object-fit-cover" alt="${(post.title || '').replace(/"/g, '&quot;')}" style="transition: transform 0.5s ease;">
                            <div class="position-absolute top-0 start-0 p-3">
                                <span class="badge bg-primary bg-opacity-75 backdrop-blur shadow-sm">${post.category || 'Geral'}</span>
                            </div>
                        </div>
                        ` : `
                        <div class="d-flex align-items-center gap-2 text-muted small mb-2">
                            <span class="badge bg-primary bg-opacity-25 text-primary">${post.category || 'Geral'}</span>
                            <span><i class="bi bi-calendar3"></i> ${date}</span>
                        </div>
                        `}
                        <div class="card-body p-0 ${hasImage ? '' : 'pt-2'}">
                        ${hasImage ? `<div class="d-flex align-items-center gap-2 text-muted small mb-2">
                            <i class="bi bi-calendar3"></i> ${date}
                        </div>` : ''}
                        <h3 class="h5 fw-bold mb-2">
                            <a href="/blog/${post.slug}" class="text-white text-decoration-none hover-gradient">${post.title}</a>
                        </h3>
                        <p class="text-muted small line-clamp-3 mb-3">
                            ${post.description || (post.content || '').replace(/<[^>]*>/g, '').substring(0, 120).trim() + '...'}
                        </p>
                        <a href="/blog/${post.slug}" class="dev-link-arrow text-primary text-decoration-none small fw-semibold">
                            Ler Artigo <i class="bi bi-arrow-right"></i>
                        </a>
                        </div>
                    </div>
                    </article>
                    </div>
                `}).join('');

                // Animations
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('animate__animated', 'animate__fadeInUp');
                            observer.unobserve(entry.target);
                        }
                    });
                });
                grid.querySelectorAll('.animate-on-scroll').forEach(el => observer.observe(el));
            };

            const setupFilters = () => {
                if (!filterContainer) return;

                const existing = new Set(
                    Array.from(filterContainer.querySelectorAll('[data-filter]')).map((btn) => btn.getAttribute('data-filter'))
                );
                const postCategories = Array.from(
                    new Set(
                        allPosts
                            .map((post) => normalizeCategory(post.category))
                            .filter((cat) => cat && cat !== 'todos')
                    )
                );

                postCategories.forEach((cat) => {
                    if (existing.has(cat)) return;
                    const button = document.createElement('button');
                    button.type = 'button';
                    button.className = 'btn btn-outline-light rounded-pill px-4';
                    button.setAttribute('data-filter', cat);
                    button.textContent = cat
                        .split(' ')
                        .map((p) => p.charAt(0).toUpperCase() + p.slice(1))
                        .join(' ');
                    filterContainer.appendChild(button);
                });

                const buttons = filterContainer.querySelectorAll('[data-filter]');
                buttons.forEach((button) => {
                    button.addEventListener('click', () => {
                        selectedFilter = button.getAttribute('data-filter') || 'todos';
                        buttons.forEach((btn) => btn.classList.remove('active'));
                        button.classList.add('active');
                        renderPosts();
                    });
                });
            };

            if (filterContainer) {
                filterContainer.querySelectorAll('[data-filter]').forEach((btn) => {
                    const filterValue = (btn.getAttribute('data-filter') || '').trim().toLowerCase();
                    if (!filterValue) return;
                    btn.textContent = defaultFilterLabels.find((label) => label.toLowerCase() === filterValue) || btn.textContent;
                });
            }

            setupFilters();
            renderPosts();
        }

        // Router
        if (slug) {
            loadPost(slug);
        } else {
            loadBlogs();
        }
    })();
</script>

<style>
    /* Local styles for blog cards */
    .hover-gradient:hover {
        background: linear-gradient(135deg, #3b82f6 0%, #06b6d4 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    article:hover img {
        transform: scale(1.05);
    }
