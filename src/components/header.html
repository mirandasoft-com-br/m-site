<!-- Main Header -->
<header class="dev-header">
  <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container">
      <!-- Logo -->
      <a class="navbar-brand d-flex align-items-center gap-2 fw-bold" href="/">
        <!-- <img src="/src/assets/images/logo.png" alt="Miranda Soft" style="height: 40px; width: auto;"> -->
        <span>Miranda<span class="brand-soft">Soft</span></span>
      </a>

      <!-- Mobile Toggle Button -->
      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-label="Abrir menu de navegação" aria-expanded="false" aria-controls="navbarNav">
        <i class="bi bi-list" style="font-size: 1.75rem;" aria-hidden="true"></i>
      </button>

      <!-- Navigation Menu -->
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-4">
          <li class="nav-item"><a class="nav-link" href="/marketplace">Marketplace</a></li>
          <li class="nav-item"><a class="nav-link" href="/blog">Blog</a></li>
          <li class="nav-item ms-lg-2" id="header-contact-action">
            <a class="dev-btn dev-btn-primary" href="/#contact">
              Fale Conosco
            </a>
          </li>
          <li class="nav-item ms-lg-2" id="header-auth-action"></li>
        </ul>
      </div>
    </div>
  </nav>
</header>

<style>
  .dev-header .navbar {
    background: rgba(10, 10, 15, 0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(59, 130, 246, 0.1);
    padding: 16px 0;
    transition: all 0.3s ease;
  }

  .dev-header .navbar.scrolled {
    background: rgba(10, 10, 15, 0.95);
    padding: 12px 0;
  }

  .dev-header .navbar-brand {
    font-size: 1.35rem;
    letter-spacing: -0.02em;
    color: #f8fafc !important;
  }

  .dev-header .nav-link {
    font-weight: 500;
    color: #94a3b8 !important;
    padding: 8px 16px !important;
    border-radius: 8px;
    transition: all 0.2s ease;
  }

  .dev-header .nav-link:hover {
    color: #f8fafc !important;
    background: rgba(59, 130, 246, 0.1);
  }

  .dev-header .dev-btn {
    padding: 10px 20px;
    font-size: 0.9rem;
  }

  .text-gradient {
    background: linear-gradient(135deg, #3b82f6 0%, #06b6d4 50%, #10b981 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .brand-soft {
    color: #475569;
  }

  /* User Menu specific styles */
  .header-user-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    max-width: 100%;
    min-width: 0;
    padding: 8px 12px;
    border: 1px solid rgba(59, 130, 246, 0.3);
    border-radius: 50px;
    background: rgba(59, 130, 246, 0.1);
    color: white !important;
    text-decoration: none;
    transition: background 0.3s ease, border-color 0.3s ease;
    box-sizing: border-box;
  }

  /* Bootstrap ::after caret breaks flex layout — use icon in markup instead */
  .header-user-btn.dropdown-toggle::after {
    display: none !important;
  }

  .header-user-btn .header-user-name {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .header-user-btn .header-user-caret {
    flex-shrink: 0;
    font-size: 0.7rem;
    opacity: 0.85;
  }

  .header-user-btn:hover {
    background: rgba(59, 130, 246, 0.2);
    border-color: #3b82f6;
  }

  @media (max-width: 991.98px) {
    .dev-header .navbar-collapse {
      background: rgba(26, 26, 37, 0.98);
      backdrop-filter: blur(20px);
      padding: 24px;
      border-radius: 16px;
      margin-top: 16px;
      border: 1px solid rgba(59, 130, 246, 0.1);
    }

    .dev-header .nav-link {
      padding: 12px 16px !important;
    }

    .dev-header .dev-btn {
      width: 100%;
      justify-content: center;
      margin-top: 12px;
    }
  }

  /* Dropdown Overrides */
  .dropdown-menu {
    background: rgba(20, 20, 25, 0.95) !important;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(59, 130, 246, 0.2) !important;
    margin-top: 10px !important;
  }

  .dropdown-item {
    transition: all 0.2s;
  }

  .dropdown-item:hover {
    background: rgba(59, 130, 246, 0.1) !important;
    color: #fff !important;
  }
</style>

<script>
  // Navbar scroll effect
  window.addEventListener('scroll', function () {
    const navbar = document.querySelector('.dev-header .navbar');
    if (window.scrollY > 50) {
      navbar.classList.add('scrolled');
    } else {
      navbar.classList.remove('scrolled');
    }
  });

  // SPA: collapse stays open on internal nav — close on mobile after link/action
  (function closeNavbarCollapseOnNavigate() {
    const navbarNav = document.getElementById('navbarNav');
    if (!navbarNav || typeof bootstrap === 'undefined') return;

    const mq = window.matchMedia('(max-width: 991.98px)');

    function hideCollapse() {
      if (!mq.matches) return;
      const el = document.getElementById('navbarNav');
      if (!el) return;
      const inst = bootstrap.Collapse.getOrCreateInstance(el, { toggle: false });
      inst.hide();
    }

    navbarNav.addEventListener('click', function (e) {
      const link = e.target.closest('a[href]');
      if (link) {
        if (link.hasAttribute('data-bs-toggle')) return;
        const href = link.getAttribute('href');
        if (href === '#' || (href && href.startsWith('javascript:'))) return;
        hideCollapse();
        return;
      }
      if (e.target.closest('button.dropdown-item')) {
        hideCollapse();
      }
    });
  })();

  // Auth Header Logic
  (function updateHeaderAuth() {
    const headerAuthItem = document.getElementById('header-auth-action');
    if (!headerAuthItem) return;

    const auth = window.authService;

    // Check immediately
    render();

    // Listen for changes
    window.addEventListener('auth-change', render);

    function render() {
      const contactAction = document.getElementById('header-contact-action');
      const isAuthenticated = auth && auth.isAuthenticated();
      
      if (contactAction) {
          contactAction.style.display = isAuthenticated ? 'none' : 'block';
      }

      if (isAuthenticated) {
        headerAuthItem.style.display = 'block';
        const user = auth.getUser();
        let menuItems = '';

        const isActive = (path) => window.location.pathname.startsWith(path) ? 'active bg-primary' : '';

        if (auth.hasRole('admin')) {
          menuItems += `<li><a class="dropdown-item text-white ${isActive('/admin')}" href="/admin"><i class="bi bi-shield-lock me-2"></i>Painel Admin</a></li>`;
        }

        if (auth.hasRole('premium')) {
          menuItems += `<li><a class="dropdown-item text-white ${isActive('/premium')}" href="/premium"><i class="bi bi-star-fill me-2"></i>Dashboard Premium</a></li>`;
        }

        if (!auth.hasRole('admin') && !auth.hasRole('premium')) {
          menuItems += `<li><a class="dropdown-item text-white ${isActive('/premium')}" href="/premium"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>`;
        }

        headerAuthItem.innerHTML = `
          <div class="dropdown">
            <button class="header-user-btn dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false" aria-label="Menu da conta">
              <i class="bi bi-person-circle flex-shrink-0" aria-hidden="true"></i>
              <span class="header-user-name">${user.name ? user.name.split(' ')[0] : 'Conta'}</span>
              <i class="bi bi-chevron-down header-user-caret" aria-hidden="true"></i>
            </button>
            <ul class="dropdown-menu dropdown-menu-end bg-dark border-secondary shadow-lg">
              <li class="dropdown-header text-muted small text-uppercase">Meus Acessos</li>
              ${menuItems}
              <li><hr class="dropdown-divider bg-secondary"></li>
              <li><a class="dropdown-item text-white" href="/profile"><i class="bi bi-person-gear me-2"></i>Meu Perfil</a></li>
              <li><button class="dropdown-item text-danger" onclick="window.authService.logout()"><i class="bi bi-box-arrow-right me-2"></i>Sair</button></li>
            </ul>
          </div>
        `;
      } else {
        headerAuthItem.innerHTML = '';
        headerAuthItem.style.display = 'none';
      }
    }
  })();
</script>
